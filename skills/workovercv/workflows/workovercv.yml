id: workovercv.repository-employment-signal
version: 0.6.0
description: >
  Produce evidence-bounded work behaviour profile reports from public technical
  repository artifacts.

inputs:
  candidate:
    type: github_profile_url_or_local_path
    required: true
    description: Public GitHub profile URL, such as https://github.com/example-user, or a local path for offline scan.
  review_scope:
    type: yaml
    required_after_discovery: true
    description: Explicit repository selection manifest generated by discovery and editable by the reviewer.

outputs:
  report_markdown:
    path: report.md
  summary_report_markdown:
    path: summary-report.md
  screening_brief_markdown:
    path: screening_brief.md
  report_json:
    path: report.json
    schema: schemas/report.schema.json
  repo_inventory:
    path: repo_inventory.json
    schema: schemas/repo_inventory.schema.json
  review_scope:
    path: review_scope.yml
    schema: schemas/review_scope.schema.json
  artifact_inventory:
    path: artifact_inventory.json
    schema: schemas/artifact_inventory.schema.json
  review_corpus:
    path: review_corpus.jsonl
    schema: schemas/review_corpus.schema.json
  work_chronology:
    path: work_chronology.json
    schema: schemas/work_chronology.schema.json
  explicit_claims:
    path: explicit_claims.jsonl
    schema: schemas/explicit_claim.schema.json
  signal_ledger:
    path: signal_ledger.jsonl
    schema: schemas/signal.schema.json
  evidence_map:
    path: evidence_map.jsonl
    schema: schemas/evidence.schema.json
  gap_register:
    path: gap_register.jsonl
    schema: schemas/gap.schema.json
  role_family_fit:
    path: role_family_fit.json
    schema: schemas/role_family_fit.schema.json
  mitigations:
    path: mitigations.jsonl
    schema: schemas/mitigation.schema.json
  red_team_review:
    path: red_team_review.json
    schema: schemas/red_team_review.schema.json
  run_manifest:
    path: run_manifest.json
    schema: schemas/run_manifest.schema.json

agent_preflight:
  - id: confirm_review_scope
    description: >
      Before agent analysis, inspect review_scope.yml and confirm that only
      selected repositories are analyzed.
  - id: evidence_boundary
    description: >
      Treat review_corpus.jsonl and inventories as the evidence boundary unless
      the user explicitly runs discovery or collection again.

stages:
  - id: discover_repositories
    description: Read a public GitHub profile and generate repo_inventory.json plus review_scope.yml.
  - id: collect_artifacts
    description: Materialize selected repositories and emit artifact_inventory.json plus review_corpus.jsonl.
  - id: extract_explicit_claims
    description: Agent extracts candidate-authored or repository-authored claims from the corpus.
  - id: extract_work_behaviour_signals
    description: Agent or deterministic rubric emits closed-set work behaviour signals from repository evidence.
  - id: retrieve_supporting_evidence
    description: Agent binds claims and signals to concrete corpus artifacts and line ranges.
  - id: identify_evidence_gaps
    description: Agent records missing evidence, limitations, and possible overclaims as uncertainty, not weakness.
  - id: map_role_family_fit
    description: Agent maps evidence-backed signals to role-family discussion routes with caveats.
  - id: generate_gap_follow_ups
    description: Agent maps every evidence gap to practical follow-up while preserving the compatibility mitigations artifact path.
  - id: red_team_report
    description: Agent checks the draft for unsupported claims, overreach, protected traits, raw chronology leakage, and missing gap follow-ups.
  - id: render_outputs
    description: Runtime renders report.md, summary-report.md, and screening_brief.md from report.json, including analysis_model_information in report.md and summary-report.md, then validates schemas, closed enums, safety wording, and evidence boundaries for all required artifacts.

non_goals:
  - hiring decision system
  - candidate ranking system
  - personality assessment
  - background check
  - protected or private trait inference
  - production-readiness certification
  - legal compliance tool
  - popularity metric as competence metric
  - private repository analysis in v0.6
  - API-backed LLM execution in v0.6
